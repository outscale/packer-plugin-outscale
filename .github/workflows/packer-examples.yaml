name: Packer examples tests

concurrency:
    group: test-us-east-2
    cancel-in-progress: false

on:
    pull_request:
        branches:
            - main
        paths:
            - "examples/**.pkr.hcl"
            - "examples/**.sh"
            - "examples/**.yml"
            - "scripts/run-examples.sh"
            - "GNUmakefile"
            - ".github/workflows/packer-examples.yaml"
    schedule:
        - cron: "30 02 * * *"
    workflow_dispatch:

permissions:
    contents: read

jobs:
    Packer_examples_tests:
        environment: test-us-east-2
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

            - name: 🧹 Frieza
              uses: outscale/frieza-github-actions/frieza-clean@68ffd39d7e181f3548369e332242b329b04a3182 # master
              with:
                  access_key: ${{ secrets.OSC_ACCESS_KEY }}
                  secret_key: ${{ secrets.OSC_SECRET_KEY }}
                  region: ${{ secrets.OSC_REGION }}

            - name: Setup Go
              uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
              with:
                  go-version-file: "go.mod"

            - name: Build packer-plugin-outscale
              run: make build

            - name: Set up Python
              uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
              with:
                  python-version: "3.14"
            - name: Install dependencies
              run: |
                  python -m pip install --upgrade pip

            - name: Install Ansible
              run: python3 -m pip install --upgrade --user ansible

            - name: Setup `packer`
              uses: hashicorp/setup-packer@c3d53c525d422944e50ee27b840746d6522b08de # v3.2.0
              with:
                  version: "latest"

            - name: Run Packer examples
              run: ./scripts/run-examples.sh
              env:
                  OSC_ACCESS_KEY: ${{secrets.OSC_ACCESS_KEY}}
                  OSC_SECRET_KEY: ${{secrets.OSC_SECRET_KEY}}
                  OSC_REGION: ${{secrets.OSC_REGION}}
